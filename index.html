<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>モックアップ共有 | take_share</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:        #2D2D2D;
      --blue-50:      #F5F8FE;
      --blue-100:     #E1EAFC;
      --blue-500:     #074DE5;
      --blue-600:     #053EB7;
      --blueGray-50:  #F7FAFC;
      --blueGray-100: #EDF2F7;
      --blueGray-200: #E2E8F0;
      --blueGray-400: #8E9EB1;
      --blueGray-500: #72859D;
      --blueGray-600: #5D738F;
      --blueGray-800: #263140;
      --blueGray-900: #1A202C;
      --green-100:    #E2F5EC;
      --green-500:    #0DA95F;
      --yellow-100:   #FEFAE3;
      --yellow-500:   #F7D835;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--blueGray-900);
      background: var(--blueGray-50);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    header {
      margin-bottom: 40px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--blue-500);
      background: var(--blue-50);
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--blueGray-900);
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .lead {
      font-size: 14px;
      color: var(--blueGray-600);
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--blueGray-500);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 32px 0 12px;
    }

    .card-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: #fff;
      border: 1px solid var(--blueGray-200);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .card:hover {
      border-color: var(--blue-500);
      box-shadow: 0 4px 16px rgba(7, 77, 229, 0.08);
      transform: translateY(-1px);
    }

    .card-icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--blue-50);
      color: var(--blue-500);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--blueGray-900);
      margin-bottom: 2px;
    }

    .card-meta {
      font-size: 12px;
      color: var(--blueGray-500);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--blueGray-100);
      color: var(--blueGray-600);
    }

    .tag.beer { background: var(--yellow-100); color: #8a6d00; }
    .tag.moet { background: var(--green-100); color: #0a6b3c; }
    .tag.mobile { background: var(--blue-50); color: var(--blue-600); }

    .card-arrow {
      flex-shrink: 0;
      color: var(--blueGray-400);
      font-size: 18px;
      transition: transform 0.15s ease, color 0.15s ease;
    }

    .card:hover .card-arrow {
      color: var(--blue-500);
      transform: translateX(2px);
    }

    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--blueGray-200);
      font-size: 12px;
      color: var(--blueGray-500);
    }

    footer a {
      color: var(--blueGray-600);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--blue-500);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="eyebrow">INTERNAL SHARE</span>
      <h1>モックアップ共有</h1>
      <p class="lead">社内レビュー用のモックアップ一覧です。カードをクリックすると詳細ページに遷移します。</p>
    </header>

    <div class="section-title">Mockups</div>
    <div class="card-list">
      <a class="card" href="./beer-spot-listing-detail-mobile.html">
        <div class="card-icon">🏥</div>
        <div class="card-body">
          <div class="card-title">Beer Web 病院詳細（スマホ）現状再現</div>
          <div class="card-meta">
            <span class="tag beer">Beer</span>
            <span class="tag mobile">Mobile</span>
            <span>beer-spot-listing-detail-mobile.html</span>
          </div>
        </div>
        <div class="card-arrow">→</div>
      </a>
    </div>

    <footer>
      <div>take_share · 社内共有用ディレクトリ</div>
    </footer>
  </div>
</body>
</html>
